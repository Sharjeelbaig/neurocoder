name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run contract checks
        run: python scripts/check_contracts.py
      - name: Run determinism checks
        run: python scripts/check_determinism.py
      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'
